<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Sign In — BOSS System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <style>
    :root {
      --bg:#080c14; --bg2:#0d1422; --surface:#131d2e; --border:#1f2d42;
      --accent:#3b82f6; --accent2:#60a5fa; --accent-glow:rgba(59,130,246,0.18);
      --purple:#8b5cf6; --text:#e2e8f0; --text2:#94a3b8; --text3:#64748b;
      --red:#ef4444; --green:#10b981;
      --card-radius: 16px;
      --input-radius: 10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { -webkit-text-size-adjust: 100%; }

    body {
      font-family:system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI',
                 Roboto, Oxygen, Ubuntu, Cantarell,
                 'Open Sans', 'Helvetica Neue';
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
      padding: 16px;
    }

    /* ── Background ── */
    .bg-mesh {
      position: fixed; inset: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 70% 60% at 15% 35%, rgba(59,130,246,0.10) 0%, transparent 70%),
        radial-gradient(ellipse 60% 70% at 85% 65%, rgba(139,92,246,0.07) 0%, transparent 70%);
    }
    .bg-grid {
      position: fixed; inset: 0; pointer-events: none;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 50px 50px;
      opacity: 0.25;
    }

    /* ── Container ── */
    .auth-container {
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 10;
      /* Fade-up on load */
      animation: fadeUp 0.45s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Logo / header ── */
    .auth-logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .auth-title {
      font-family:system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI',
                 Roboto, Oxygen, Ubuntu, Cantarell,
                 'Open Sans', 'Helvetica Neue';
      font-weight: 800; font-size: clamp(22px, 5vw, 26px);
      background: linear-gradient(135deg, var(--text), var(--text2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .auth-sub {
      font-size: clamp(12px, 3vw, 13.5px);
      color: var(--text3);
      margin-top: 5px;
      line-height: 1.4;
    }

    /* ── Card ── */
    .auth-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      padding: clamp(20px, 5vw, 32px);
    }

    /* ── Alerts ── */
    .error-msg, .success-msg {
      border-radius: var(--input-radius);
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 18px;
      display: flex; align-items: flex-start; gap: 8px;
      line-height: 1.4;
    }
    .error-msg {
      background: rgba(239,68,68,0.10);
      border: 1px solid rgba(239,68,68,0.25);
      color: #f87171;
    }
    .success-msg {
      background: rgba(16,185,129,0.10);
      border: 1px solid rgba(16,185,129,0.25);
      color: #34d399;
    }
    .error-msg i, .success-msg i { margin-top: 2px; flex-shrink: 0; }

    /* ── Form ── */
    .form-group { margin-bottom: 18px; }

    .form-label {
      display: block;
      font-size: 11px; font-weight: 600;
      color: var(--text2);
      text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 7px;
    }

    .input-wrap { position: relative; }

    .input-icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--text3); font-size: 14px; pointer-events: none;
      transition: color 0.15s;
    }

    .form-control {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: var(--input-radius);
      padding: 12px 12px 12px 40px;
      color: var(--text);
      font-size: 14px;
      font-family:system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI',
                 Roboto, Oxygen, Ubuntu, Cantarell,
                 'Open Sans', 'Helvetica Neue';
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
      outline: none;
      /* Prevent zoom on iOS when font-size < 16px */
      -webkit-appearance: none;
      appearance: none;
    }

    /* iOS: bump to 16px so browser doesn't auto-zoom */
    @media (max-width: 480px) {
      .form-control { font-size: 16px; padding: 13px 12px 13px 40px; }
    }

    .form-control:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
      background: rgba(255,255,255,0.06);
    }

    .form-control:focus + .input-icon,
    .input-wrap:focus-within .input-icon { color: var(--accent2); }

    .form-control::placeholder { color: var(--text3); }

    /* ── Submit button ── */
    .btn-submit {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--accent), #2563eb);
      color: #fff;
      font-size: 14px; font-weight: 700;
      border: none; border-radius: var(--input-radius);
      cursor: pointer;
      font-family:system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI',
                 Roboto, Oxygen, Ubuntu, Cantarell,
                 'Open Sans', 'Helvetica Neue';
      transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: 6px;
      letter-spacing: 0.03em;
      box-shadow: 0 4px 16px rgba(59,130,246,0.30);
      /* Tap highlight removal on mobile */
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .btn-submit:hover { opacity: 0.90; box-shadow: 0 6px 20px rgba(59,130,246,0.40); }
    .btn-submit:active { transform: scale(0.98); opacity: 0.85; }

    /* ── Divider ── */
    .divider {
      text-align: center;
      color: var(--text3); font-size: 12px;
      margin: 22px 0;
      position: relative;
    }
    .divider::before, .divider::after {
      content: ''; position: absolute; top: 50%;
      width: calc(50% - 32px); height: 1px;
      background: var(--border);
    }
    .divider::before { left: 0; }
    .divider::after  { right: 0; }

    /* ── Footer ── */
    .auth-footer {
      text-align: center;
      font-size: 13px;
      color: var(--text3);
    }
    .auth-footer a {
      color: var(--accent2); text-decoration: none;
      font-weight: 500;
    }
    .auth-footer a:hover { text-decoration: underline; }

    .powered-by {
      text-align: center;
      margin-top: 28px;
      font-size: 11px;
      color: var(--text3);
      opacity: 0.55;
    }
    .powered-by span { color: var(--accent2); opacity: 1; }

    /* ── Small phones (≤ 360px) ── */
    @media (max-width: 360px) {
      body { padding: 12px; }
      .auth-logo { margin-bottom: 20px; }
      .logo-mark { width: 48px; height: 48px; font-size: 16px; border-radius: 13px; }
      .auth-card { padding: 18px; }
      .form-group { margin-bottom: 14px; }
    }

    /* ── Landscape phones ── */
    @media (max-height: 600px) and (orientation: landscape) {
      body { align-items: flex-start; padding: 12px 16px; }
      .auth-logo { margin-bottom: 16px; }
      .logo-mark { width: 44px; height: 44px; font-size: 15px; margin-bottom: 8px; }
      .auth-title { font-size: 20px; }
      .auth-sub { display: none; }
      .auth-card { padding: 20px 24px; }
      .form-group { margin-bottom: 12px; }
      .powered-by { margin-top: 16px; }
    }

    /* ── Tablets (≥ 640px) ── */
    @media (min-width: 640px) {
      .auth-container { max-width: 440px; }
      .auth-logo { margin-bottom: 32px; }
    }
  </style>
</head>
<body>
  <div class="bg-mesh"></div>
  <div class="bg-grid"></div>

  <div class="auth-container">
    <div class="auth-logo">
      <div class="logo-mark">BOS</div>
      <div class="auth-title">BOSS System</div>
      <div class="auth-sub">Business Operating System — Corporate Portal</div>
    </div>

    <div class="auth-card">
      {% if error %}
      <div class="error-msg">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span>{{ error }}</span>
      </div>
      {% endif %}
      {% if request.query_params.get('registered') %}
      <div class="success-msg">
        <i class="fa-solid fa-check-circle"></i>
        <span>Account created! You can now sign in.</span>
      </div>
      {% endif %}

      <form method="POST" action="/auth/login" autocomplete="on">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <div class="input-wrap">
            <input type="email" id="email" name="email" class="form-control"
              placeholder="you@company.com" required autocomplete="email"/>
            <i class="fa-solid fa-envelope input-icon"></i>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-wrap">
            <input type="password" id="password" name="password" class="form-control"
              placeholder="••••••••" required autocomplete="current-password"/>
            <i class="fa-solid fa-lock input-icon"></i>
          </div>
        </div>
        <button type="submit" class="btn-submit">
          <i class="fa-solid fa-right-to-bracket"></i> Sign In to BOSS
        </button>
      </form>

      <div class="divider">or</div>

      <div class="auth-footer">
        New to BOSS? <a href="/auth/register">Create your account</a>
      </div>
    </div>

    <div class="powered-by">Powered by <span>MindSync AI Consults</span> · BOSS v1.0</div>
  </div>
</body>
</html>
